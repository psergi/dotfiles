set -g default-terminal "tmux-256color"
set -s escape-time 0
set -g mouse on # terminal scrolling

# Bind prefix to Ctrl+a instead of Ctrl+b
unbind C-b
set -g prefix C-a
# Send Ctrl+a if pressed twice
bind C-a send-prefix

# Style status line
set -g mode-style "fg=#131a24,bg=#aeafb0"
set -g message-style "fg=#aeafb0,bg=#131a24"
set -g message-command-style "fg=#aeafb0,bg=#131a24"
set -g pane-border-lines heavy
set -g pane-border-style "fg=#aeafb0"
set -g pane-border-style "fg=#2b3b51"
set -g pane-active-border-style "fg=#2b3b51"
set -g prompt-cursor-colour "#aeafb0"
set -g prompt-cursor-style block
set -g status on
set -g status-style "fg=#aeafb0,bg=default"
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify centre
set -g status-left " #{session_name} "
set -g status-right " #[fg=#14b919]#[default] tmux "
set -g window-status-format " [#I:#W] "
set -g window-status-current-format " [#I:#W] "
set -g window-status-current-style "fg=#ffffff,bg=default"

# vim-like pane switching
bind-key k select-pane -U
bind-key j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R

# Prefix+X to kill other panes in the current window
bind-key X kill-pane -a

# Override the default session key index
unbind -T prefix s
bind-key -T prefix s choose-tree -Zs -K '#{e|+:#{line},1}'

# Start window numbering at 1
set -g base-index 1

# Reload tmux config with Prefix+r
unbind r
bind r source-file ~/.config/tmux/tmux.conf
